<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snap</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0f18;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace}
  #aw{width:700px}

  #hud{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;
       background:#0f1a27;border:1px solid #1a3a5c;border-bottom:none;border-radius:8px 8px 0 0}
  .pi{display:flex;flex-direction:column;gap:4px}
  .pilabel{font-size:10px;color:#4a7898;letter-spacing:1.5px}
  .amrow{display:flex;gap:2px;flex-wrap:wrap;max-width:130px}
  .pp{width:7px;height:12px;border-radius:1px;border:0.5px solid}
  .pp-y{background:#1d9e75;border-color:#0f6e56}
  .pp-ye{background:#0c1e2e;border-color:#1a3a5c}
  .pp-b{background:#d85a30;border-color:#993c1d}
  .pp-be{background:#0c1e2e;border-color:#1a3a5c}

  .parry-ind{display:flex;flex-direction:column;gap:3px;align-items:center;margin-top:2px}
  .parry-bar-bg{width:54px;height:4px;background:#0c1e2e;border-radius:2px;overflow:hidden}
  .parry-bar-fill{height:100%;border-radius:2px;transition:width .03s}
  .parry-label{font-size:8px;letter-spacing:1px}

  .cdwrap{display:flex;flex-direction:column;gap:4px;align-items:center}
  .cdlabel{font-size:9px;color:#4a7898;letter-spacing:1px}
  .cdbg{width:80px;height:4px;background:#0c1e2e;border-radius:2px;overflow:hidden}
  .cdfill{height:100%;background:#1d9e75;border-radius:2px;transition:width .05s}

  #timer-display{font-size:20px;font-weight:bold;color:#c8e4f8;letter-spacing:3px;text-align:center;line-height:1}
  #timer-display.warn{color:#d85a30;animation:tblink .5s infinite}
  @keyframes tblink{0%,100%{opacity:1}50%{opacity:.35}}

  #round-row{display:flex;gap:8px;justify-content:center;margin-top:4px}
  .rpip{width:10px;height:10px;border-radius:50%;border:1px solid #1a3a5c;background:#0c1e2e;transition:background .2s}
  .rpip.p-win{background:#1d9e75;border-color:#0f6e56}
  .rpip.b-win{background:#d85a30;border-color:#993c1d}

  #cwrap{position:relative;line-height:0}
  canvas{display:block;width:100%;cursor:crosshair;border-radius:0 0 8px 8px}

  #ol{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
      justify-content:center;background:rgba(6,14,24,0.95);border-radius:0 0 8px 8px}
  #ol h2{font-size:28px;font-weight:500;letter-spacing:8px;color:#c8e4f8;margin:0 0 18px}

  .obtn{font-family:inherit;font-size:11px;letter-spacing:2px;padding:8px 22px;
        background:transparent;border:1px solid #1d9e75;color:#1d9e75;cursor:pointer;
        border-radius:4px;margin-top:10px}
  .obtn:hover{background:rgba(29,158,117,0.12)}
  .obtn-sec{border-color:#4a7898;color:#4a7898;margin-top:6px}
  .obtn-sec:hover{background:rgba(74,120,152,0.1)}

  #difrow{display:flex;gap:6px;margin-top:4px}
  .difbtn{font-family:inherit;font-size:10px;letter-spacing:1.5px;padding:5px 12px;
          background:transparent;border:1px solid #1a3a5c;color:#4a7898;cursor:pointer;border-radius:3px}
  .difbtn:hover{border-color:#4a7898;color:#8ab}
  .difbtn.active{border-color:#1d9e75;color:#1d9e75}

  #settings{display:none;position:absolute;inset:0;background:rgba(6,14,24,0.97);
            flex-direction:column;align-items:center;justify-content:center;border-radius:0 0 8px 8px}
  #settings.show{display:flex}
  #settings h3{font-size:14px;letter-spacing:4px;color:#c8e4f8;margin-bottom:14px}
  .hkrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .hklabel{font-size:10px;color:#4a7898;width:100px;text-align:right;letter-spacing:0.5px}
  .hkbtn{font-family:inherit;font-size:11px;padding:4px 12px;background:transparent;
         border:1px solid #1a3a5c;color:#8ab;cursor:pointer;border-radius:3px;
         min-width:60px;letter-spacing:1px}
  .hkbtn:hover{border-color:#4a7898}
  .hkbtn.listening{border-color:#d85a30;color:#d85a30;animation:tblink .7s infinite}
  .stlabel{font-size:10px;margin-top:1px}
</style>
</head>
<body>
<div id="aw">
  <div id="hud">
    <div class="pi">
      <div class="pilabel">▶ YOU</div>
      <div class="amrow" id="pam"></div>
      <div class="parry-ind" id="p-parry-ind">
        <div class="parry-bar-bg"><div class="parry-bar-fill" id="p-parry-fill" style="width:100%"></div></div>
        <div class="parry-label" id="p-parry-lbl" style="color:#f0d060">PARRY READY</div>
      </div>
      <div class="stlabel" id="pst" style="color:#1d9e75">READY</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:5px;align-items:center">
      <div id="timer-display">2:30</div>
      <div id="round-row"></div>
      <div class="cdwrap">
        <div class="cdlabel">SHOOT CD</div>
        <div class="cdbg"><div class="cdfill" id="cdf" style="width:100%"></div></div>
      </div>
    </div>

    <div class="pi" style="align-items:flex-end">
      <div class="pilabel">BOT ◀</div>
      <div class="amrow" id="bam" style="justify-content:flex-end"></div>
      <div class="parry-ind" id="b-parry-ind" style="align-items:flex-end">
        <div class="parry-bar-bg"><div class="parry-bar-fill" id="b-parry-fill" style="width:100%"></div></div>
        <div class="parry-label" id="b-parry-lbl" style="color:#d85a30">PARRY READY</div>
      </div>
      <div class="stlabel" id="bst" style="color:#d85a30">READY</div>
    </div>
  </div>

  <div id="cwrap">
    <canvas id="gc" width="680" height="490"></canvas>

    <div id="ol">
      <h2 id="olt">SNAP</h2>
      <div id="difrow">
        <button class="difbtn active" onclick="setDif('easy',this)">EASY</button>
        <button class="difbtn" onclick="setDif('medium',this)">MEDIUM</button>
        <button class="difbtn" onclick="setDif('hard',this)">HARD</button>
      </div>
      <button class="obtn" id="sbtn" onclick="startRound()">START</button>
      <button class="obtn obtn-sec" onclick="openSettings()">SETTINGS</button>
    </div>

    <div id="settings">
      <h3>HOTKEYS</h3>
      <div class="hkrow"><span class="hklabel">Move Up</span>   <button class="hkbtn" id="hk-up"    onclick="listenKey('up',this)"></button></div>
      <div class="hkrow"><span class="hklabel">Move Down</span> <button class="hkbtn" id="hk-down"  onclick="listenKey('down',this)"></button></div>
      <div class="hkrow"><span class="hklabel">Move Left</span> <button class="hkbtn" id="hk-left"  onclick="listenKey('left',this)"></button></div>
      <div class="hkrow"><span class="hklabel">Move Right</span><button class="hkbtn" id="hk-right" onclick="listenKey('right',this)"></button></div>
      <div class="hkrow"><span class="hklabel">Shoot</span>     <button class="hkbtn" id="hk-shoot" onclick="listenKey('shoot',this)"></button></div>
      <div class="hkrow"><span class="hklabel">Parry</span>     <button class="hkbtn" id="hk-parry" onclick="listenKey('parry',this)"></button></div>
      <button class="obtn" style="margin-top:14px" onclick="closeSettings()">DONE</button>
      <button class="obtn obtn-sec" onclick="resetHotkeys()">RESET DEFAULTS</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CANVAS / ARENA
══════════════════════════════════════════════ */
const canvas = document.getElementById('gc'), ctx = canvas.getContext('2d');
const CW = 680, CH = 490, MG = 32;
const AR = { x: MG, y: MG, w: CW - MG*2, h: CH - MG*2 };
const PAD_R = 44;
const PADS = [
  { x: AR.x+PAD_R,          y: AR.y+PAD_R          },
  { x: AR.x+AR.w-PAD_R,     y: AR.y+PAD_R          },
  { x: AR.x+PAD_R,          y: AR.y+AR.h-PAD_R     },
  { x: AR.x+AR.w-PAD_R,     y: AR.y+AR.h-PAD_R     },
];

/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const PR         = 12;
const BR         = 4;
const BS         = 10;    // bullet speed (slightly faster)
const PS         = 2.0;   // player speed (faster)
const MAXAMMO    = 15;
const SHOOT_CD   = 1500;
const PARRY_WIN  = 250;
const PARRY_CD   = 250;
const PARRY_DIST = 56;
const MATCH_TIME = 150;
const WIN_ROUNDS = 5;
const WL = 54, WT = 10;

/* ══════════════════════════════════════════════
   DIFFICULTY
══════════════════════════════════════════════ */
const DIFS = {
  easy:   { spd:1.6,  sTimer:[1400,1800], jitter:0.22, bounceChance:0.12, predict:4,  parryReact:0,   mistakeRate:0.30 },
  medium: { spd:2.1,  sTimer:[700, 1100], jitter:0.09, bounceChance:0.28, predict:9,  parryReact:0.3, mistakeRate:0.15 },
  hard:   { spd:2.7,  sTimer:[350, 650],  jitter:0.03, bounceChance:0.42, predict:14, parryReact:0.7, mistakeRate:0.05 },
};
let difficulty = 'easy';
function setDif(d, btn) {
  difficulty = d;
  document.querySelectorAll('.difbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════════════════════════════════════════
   HOTKEYS
══════════════════════════════════════════════ */
let HK = { up:'w', down:'s', left:'a', right:'d', shoot:'space', parry:'f' };
let listeningFor = null;

function displayKey(k) {
  const map = { arrowup:'↑', arrowdown:'↓', arrowleft:'←', arrowright:'→', ' ':'SPACE', 'space':'SPACE' };
  return map[k] || k.toUpperCase();
}
function resetHotkeys() {
  HK = { up:'w', down:'s', left:'a', right:'d', shoot:'space', parry:'f' };
  renderHotkeys();
}
function renderHotkeys() {
  ['up','down','left','right','shoot','parry'].forEach(k => {
    const el = document.getElementById('hk-'+k);
    if (el) el.textContent = displayKey(HK[k]);
  });
}
function listenKey(action, btn) {
  listeningFor = action;
  document.querySelectorAll('.hkbtn').forEach(b => b.classList.remove('listening'));
  btn.classList.add('listening'); btn.textContent = '...';
}
function openSettings()  { document.getElementById('settings').classList.add('show'); }
function closeSettings() { document.getElementById('settings').classList.remove('show'); }

/* ══════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════ */
let gstate = 'menu';
let player, bot, bullets = [], walls = [], particles = [], keys = {}, mouse = { x:340, y:245 };
let pST = 0, bST = 0;
let botMT = 0, botTarget = null, botSTimer = 0;
let lastT = 0, raf;
let matchStart = 0, timeLeft = MATCH_TIME;
let roundScores = { player:0, bot:0 };
let roundNum = 0;
let pParry = { state:'ready', since:-9999 };
let bParry = { state:'ready', since:-9999 };
const clamp = (v,a,b) => Math.max(a, Math.min(b,v));

/* ══════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════ */
function spawnHitParticles(x, y, vx, vy, owner) {
  const col = owner==='player' ? '#2dcf99' : '#e06832';
  for (let i=0; i<18; i++) {
    const ang = Math.atan2(-vy,-vx) - Math.PI*0.45 + Math.random()*Math.PI*0.9;
    const spd = 0.5+Math.random()*3.5;
    particles.push({ x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life:1, decay:0.035+Math.random()*0.045, size:1+Math.random()*2.5, col, type:'spark' });
  }
  particles.push({ x,y, life:1, decay:0.055, r:2, maxR:22, col, type:'ring' });
  particles.push({ x,y, life:1, decay:0.12,  size:8, col, type:'flash' });
}
function spawnParryParticles(x, y, owner) {
  const col = owner==='player' ? '#f0d060' : '#f09030';
  for (let i=0; i<24; i++) {
    const ang = (i/24)*Math.PI*2, spd = 1.2+Math.random()*2.8;
    particles.push({ x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      life:1, decay:0.03+Math.random()*0.04, size:1.5+Math.random()*2, col, type:'spark' });
  }
  particles.push({ x,y, life:1, decay:0.04, r:2, maxR:35, col, type:'ring' });
  particles.push({ x,y, life:1, decay:0.08, size:14, col, type:'flash' });
}

/* ══════════════════════════════════════════════
   HUD
══════════════════════════════════════════════ */
function buildAmmoHUD(id, amt, max, on, off) {
  const el = document.getElementById(id); el.innerHTML='';
  for (let i=0; i<max; i++) {
    const d = document.createElement('div');
    d.className = 'pp '+(i<amt?on:off); el.appendChild(d);
  }
}
function buildRoundPips() {
  const row = document.getElementById('round-row'); row.innerHTML='';
  for (let i=0; i<WIN_ROUNDS; i++) {
    const d=document.createElement('div');
    d.className='rpip'+(i<roundScores.player?' p-win':''); row.appendChild(d);
  }
  const sep=document.createElement('div');
  sep.style.cssText='width:1px;background:#1a3a5c;height:10px;margin:0 4px';
  row.appendChild(sep);
  for (let i=0; i<WIN_ROUNDS; i++) {
    const d=document.createElement('div');
    d.className='rpip'+(i<roundScores.bot?' b-win':''); row.appendChild(d);
  }
}
function updateHUD() {
  buildAmmoHUD('pam', player?.ammo??MAXAMMO, MAXAMMO, 'pp-y','pp-ye');
  buildAmmoHUD('bam', bot?.ammo??MAXAMMO,   MAXAMMO, 'pp-b','pp-be');
  buildRoundPips();
}
function updateParryHUD(now) {
  _updateOneParryHUD('p', pParry, '#f0d060', now);
  _updateOneParryHUD('b', bParry, '#d85a30', now);
}
function _updateOneParryHUD(prefix, ps, col, now) {
  const fill = document.getElementById(prefix+'-parry-fill');
  const lbl  = document.getElementById(prefix+'-parry-lbl');
  const ind  = document.getElementById(prefix+'-parry-ind');
  ind.className = 'parry-ind';
  if (ps.state==='ready') {
    fill.style.width='100%'; fill.style.background=col;
    lbl.textContent='PARRY READY'; lbl.style.color=col;
  } else if (ps.state==='active') {
    const t = Math.min((now-ps.since)/PARRY_WIN,1);
    fill.style.width=(100-t*100)+'%'; fill.style.background='#ffffff';
    lbl.textContent='PARRYING!'; lbl.style.color='#ffffff';
  } else {
    const t = Math.min((now-ps.since)/PARRY_CD,1);
    fill.style.width=(t*100)+'%'; fill.style.background='#444';
    lbl.textContent='CD'; lbl.style.color='#555';
  }
}

/* ══════════════════════════════════════════════
   STATIC WALLS
══════════════════════════════════════════════ */
function buildStaticWalls() {
  walls = [];
  const cx=AR.x+AR.w/2, cy=AR.y+AR.h/2;
  // Center wall horizontal
  walls.push({ x:cx-WL/2, y:cy-WT/2, w:WL, h:WT, owner:'neutral' });
  // Player wall vertical
  const px=AR.x+70;
  walls.push({ x:px+30, y:cy-WL/2, w:WT, h:WL, owner:'player' });
  // Bot wall vertical
  const bx=AR.x+AR.w-70;
  walls.push({ x:bx-30-WT, y:cy-WL/2, w:WT, h:WL, owner:'bot' });
}

/* ══════════════════════════════════════════════
   WALL COLLISION FOR PLAYERS
══════════════════════════════════════════════ */
function resolvePlayerWallCollision(entity) {
  for (const w of walls) {
    // AABB circle-vs-rect
    const nearX = clamp(entity.x, w.x, w.x+w.w);
    const nearY = clamp(entity.y, w.y, w.y+w.h);
    const dx = entity.x-nearX, dy = entity.y-nearY;
    const dist = Math.hypot(dx,dy);
    if (dist < PR && dist > 0) {
      // Push out
      const overlap = PR-dist;
      entity.x += dx/dist*overlap;
      entity.y += dy/dist*overlap;
    } else if (dist===0) {
      // Directly on corner — push up
      entity.y -= PR;
    }
  }
}

/* ══════════════════════════════════════════════
   PARRY
══════════════════════════════════════════════ */
function tryParry(ps, now) {
  if (ps.state!=='ready') return;
  ps.state='active'; ps.since=now;
}
function updateParryStates(now) {
  for (const ps of [pParry, bParry]) {
    if (ps.state==='active' && now-ps.since>=PARRY_WIN) { ps.state='cd'; ps.since=now; }
    else if (ps.state==='cd' && now-ps.since>=PARRY_CD) { ps.state='ready'; }
  }
}
function checkParryBullets(now) {
  for (const b of bullets) {
    if (b.dead) continue;
    if (b.owner==='bot' && pParry.state==='active' && player.alive) {
      if (Math.hypot(b.x-player.x, b.y-player.y) < PARRY_DIST) {
        const ax=bot.x-b.x, ay=bot.y-b.y, al=Math.hypot(ax,ay)||1;
        b.vx=ax/al*BS; b.vy=ay/al*BS; b.owner='player';
        spawnParryParticles(player.x, player.y, 'player');
        pParry.state='cd'; pParry.since=now;
      }
    }
    if (b.owner==='player' && bParry.state==='active' && bot.alive) {
      if (Math.hypot(b.x-bot.x, b.y-bot.y) < PARRY_DIST) {
        const ax=player.x-b.x, ay=player.y-b.y, al=Math.hypot(ax,ay)||1;
        b.vx=ax/al*BS; b.vy=ay/al*BS; b.owner='bot';
        spawnParryParticles(bot.x, bot.y, 'bot');
        bParry.state='cd'; bParry.since=now;
      }
    }
  }
}

/* ══════════════════════════════════════════════
   BOT PARRY + MISTAKE
══════════════════════════════════════════════ */
function botConsiderParry(now) {
  if (!bot.alive || bParry.state!=='ready') return;
  const dc = DIFS[difficulty];
  if (dc.parryReact<=0) return;
  for (const b of bullets) {
    if (b.dead || b.owner!=='player') continue;
    const dist = Math.hypot(b.x-bot.x, b.y-bot.y);
    if (dist < PARRY_DIST*1.4) {
      const dx=bot.x-b.x, dy=bot.y-b.y, dl=Math.hypot(dx,dy)||1;
      const dot=(b.vx*dx/dl)+(b.vy*dy/dl);
      if (dot>0 && Math.random()<dc.parryReact) tryParry(bParry, now);
    }
  }
}

/* ══════════════════════════════════════════════
   SHOOTING
══════════════════════════════════════════════ */
function fireShot(shooter, dx, dy, owner) {
  const now = performance.now();
  if (!shooter.alive||shooter.ammo<=0||now-(owner==='player'?pST:bST)<SHOOT_CD) return;
  const len=Math.hypot(dx,dy); if(len<0.01) return;
  if (owner==='player') pST=now; else bST=now;
  shooter.ammo--;
  bullets.push({ x:shooter.x+dx/len*(PR+3), y:shooter.y+dy/len*(PR+3),
    vx:dx/len*BS, vy:dy/len*BS, owner, born:now, trail:[] });
  updateHUD();
}

/* ══════════════════════════════════════════════
   GAME FLOW
══════════════════════════════════════════════ */
function startRound() {
  const dc = DIFS[difficulty];
  player = { x:AR.x+70, y:AR.y+AR.h/2, vx:0, vy:0, ammo:MAXAMMO, alive:true };
  bot    = { x:AR.x+AR.w-70, y:AR.y+AR.h/2, vx:0, vy:0, ammo:MAXAMMO, alive:true, spd:dc.spd };
  bullets=[]; particles=[]; keys={};
  pST=-9999; bST=-5000;
  pParry={state:'ready',since:-9999}; bParry={state:'ready',since:-9999};
  botMT=0; botTarget=null;
  botSTimer=dc.sTimer[0]+Math.random()*(dc.sTimer[1]-dc.sTimer[0]);
  buildStaticWalls();
  matchStart=performance.now(); timeLeft=MATCH_TIME; roundNum++;
  document.getElementById('ol').style.display='none';
  document.getElementById('settings').classList.remove('show');
  document.getElementById('timer-display').classList.remove('warn');
  gstate='playing';
  updateHUD();
  lastT=performance.now();
  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function endRound(winner) {
  gstate='roundover';
  if (winner==='player') roundScores.player++;
  else if (winner==='bot') roundScores.bot++;
  const ol=document.getElementById('ol'), t=document.getElementById('olt');
  const m=document.getElementById('olm')||document.createElement('p');
  m.id='olm'; m.style.cssText='font-size:11px;color:#4a7898;text-align:center;margin-bottom:4px';
  if (!document.getElementById('olm')) ol.insertBefore(m, document.getElementById('difrow'));
  const sb=document.getElementById('sbtn');
  ol.style.display='flex';
  buildRoundPips();

  if (roundScores.player>=WIN_ROUNDS) {
    t.textContent='YOU WIN!'; t.style.color='#1d9e75';
    m.innerHTML=`Match won ${roundScores.player}–${roundScores.bot}`;
    sb.textContent='NEW MATCH'; sb.onclick=resetMatch;
  } else if (roundScores.bot>=WIN_ROUNDS) {
    t.textContent='BOT WINS'; t.style.color='#d85a30';
    m.innerHTML=`Match lost ${roundScores.bot}–${roundScores.player}`;
    sb.textContent='NEW MATCH'; sb.onclick=resetMatch;
  } else {
    if (winner==='player')     { t.textContent='ROUND WIN';  t.style.color='#1d9e75'; }
    else if (winner==='bot')   { t.textContent='ROUND LOST'; t.style.color='#d85a30'; }
    else                       { t.textContent='DRAW';       t.style.color='#c8a030'; }
    m.innerHTML=`<span style="color:#1d9e75">${roundScores.player}</span> – <span style="color:#d85a30">${roundScores.bot}</span> &nbsp;·&nbsp; First to ${WIN_ROUNDS}`;
    sb.textContent='NEXT ROUND'; sb.onclick=startRound;
  }
}

function resetMatch() {
  roundScores={player:0,bot:0}; roundNum=0;
  const sb=document.getElementById('sbtn');
  sb.textContent='START'; sb.onclick=startRound;
  document.getElementById('olt').textContent='SNAP';
  document.getElementById('olt').style.color='#c8e4f8';
  const om=document.getElementById('olm');
  if(om) om.remove();
  buildRoundPips();
}

/* ══════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  const k = e.key==' ' ? 'space' : e.key.toLowerCase();
  if (listeningFor) {
    HK[listeningFor]=k;
    document.getElementById('hk-'+listeningFor).textContent=displayKey(k);
    document.getElementById('hk-'+listeningFor).classList.remove('listening');
    listeningFor=null; renderHotkeys(); e.preventDefault(); return;
  }
  if (!keys[k]) {
    keys[k]=true;
    if (gstate==='playing') {
      if (k===HK.parry && player?.alive) tryParry(pParry, performance.now());
      if (k===HK.shoot && player?.alive) fireShot(player, mouse.x-player.x, mouse.y-player.y, 'player');
    }
  }
  if ([HK.up,HK.down,HK.left,HK.right,'arrowup','arrowdown','arrowleft','arrowright','space'].includes(k) && gstate==='playing')
    e.preventDefault();
});
document.addEventListener('keyup', e => {
  const k = e.key==' ' ? 'space' : e.key.toLowerCase();
  keys[k]=false;
});
canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(CW/r.width);
  mouse.y=(e.clientY-r.top)*(CH/r.height);
});
// Click still shoots too
canvas.addEventListener('click', () => {
  if (gstate!=='playing'||!player?.alive) return;
  fireShot(player, mouse.x-player.x, mouse.y-player.y, 'player');
});

/* ══════════════════════════════════════════════
   LOOP
══════════════════════════════════════════════ */
function loop(ts) {
  if (gstate!=='playing') return;
  const dt=Math.min(ts-lastT,50); lastT=ts;
  update(dt); draw(ts);
  raf=requestAnimationFrame(loop);
}

/* ══════════════════════════════════════════════
   COLLISION HELPERS
══════════════════════════════════════════════ */
function bulletHitsWall(bx, by) {
  for (const w of walls)
    if (bx>=w.x-BR && bx<=w.x+w.w+BR && by>=w.y-BR && by<=w.y+w.h+BR) return true;
  return false;
}
function pushOutOfPads(entity) {
  for (const p of PADS) {
    const dx=entity.x-p.x, dy=entity.y-p.y, dist=Math.hypot(dx,dy);
    if (dist<PAD_R+PR) {
      const push=PAD_R+PR+1, d=dist||1;
      entity.x=clamp(p.x+dx/d*push, AR.x+PR, AR.x+AR.w-PR);
      entity.y=clamp(p.y+dy/d*push, AR.y+PR, AR.y+AR.h-PR);
    }
  }
}
function outOfBounds(bx, by) {
  return bx<AR.x||bx>AR.x+AR.w||by<AR.y||by>AR.y+AR.h;
}

/* ══════════════════════════════════════════════
   UPDATE
══════════════════════════════════════════════ */
function update(dt) {
  const now=performance.now(), dc=DIFS[difficulty];

  // Timer
  timeLeft=MATCH_TIME-(now-matchStart)/1000;
  if (timeLeft<=0) { timeLeft=0; endRound('draw'); return; }
  const secs=Math.ceil(timeLeft);
  const td=document.getElementById('timer-display');
  td.textContent=Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0');
  td.classList.toggle('warn', timeLeft<=20);

  // Parry state machines
  updateParryStates(now);

  // Player movement
  let pdx=0, pdy=0;
  if (keys[HK.up]||keys['arrowup'])    pdy-=1;
  if (keys[HK.down]||keys['arrowdown'])pdy+=1;
  if (keys[HK.left]||keys['arrowleft'])pdx-=1;
  if (keys[HK.right]||keys['arrowright'])pdx+=1;
  if (pdx||pdy) { const l=Math.hypot(pdx,pdy); player.vx=pdx/l*PS; player.vy=pdy/l*PS; }
  else { player.vx=0; player.vy=0; }
  if (player.alive) {
    player.x=clamp(player.x+player.vx, AR.x+PR, AR.x+AR.w-PR);
    player.y=clamp(player.y+player.vy, AR.y+PR, AR.y+AR.h-PR);
    pushOutOfPads(player);
    resolvePlayerWallCollision(player);
    // Clamp again after push
    player.x=clamp(player.x, AR.x+PR, AR.x+AR.w-PR);
    player.y=clamp(player.y, AR.y+PR, AR.y+AR.h-PR);
  }

  // Bot AI
  if (bot.alive) {
    botMT-=dt; botSTimer-=dt;

    // Movement target
    if (botMT<=0||!botTarget) {
      botMT=600+Math.random()*900;
      const r=Math.random();
      if (r<0.44) {
        const a=Math.atan2(player.y-bot.y, player.x-bot.x);
        botTarget={
          x:clamp(bot.x+Math.cos(a)*(80+Math.random()*130)+(Math.random()-.5)*55, AR.x+PR+12, AR.x+AR.w-PR-12),
          y:clamp(bot.y+Math.sin(a)*(80+Math.random()*130)+(Math.random()-.5)*55, AR.y+PR+12, AR.y+AR.h-PR-12),
        };
      } else if (r<0.72) {
        const a=Math.atan2(player.y-bot.y, player.x-bot.x)+Math.PI/2*(Math.random()>.5?1:-1);
        botTarget={
          x:clamp(bot.x+Math.cos(a)*(60+Math.random()*110), AR.x+PR+12, AR.x+AR.w-PR-12),
          y:clamp(bot.y+Math.sin(a)*(60+Math.random()*110), AR.y+PR+12, AR.y+AR.h-PR-12),
        };
      } else {
        botTarget={
          x:AR.x+PR+15+Math.random()*(AR.w-PR*2-30),
          y:AR.y+PR+15+Math.random()*(AR.h-PR*2-30),
        };
      }
    }

    const bdx=botTarget.x-bot.x, bdy=botTarget.y-bot.y, bd=Math.hypot(bdx,bdy);
    if (bd>4) { bot.vx=bdx/bd*bot.spd; bot.vy=bdy/bd*bot.spd; }
    else      { bot.vx=0; bot.vy=0; }
    bot.x=clamp(bot.x+bot.vx, AR.x+PR, AR.x+AR.w-PR);
    bot.y=clamp(bot.y+bot.vy, AR.y+PR, AR.y+AR.h-PR);
    pushOutOfPads(bot);
    resolvePlayerWallCollision(bot);
    bot.x=clamp(bot.x, AR.x+PR, AR.x+AR.w-PR);
    bot.y=clamp(bot.y, AR.y+PR, AR.y+AR.h-PR);

    // Bot shoot — with occasional mistake
    if (botSTimer<=0 && bot.ammo>0 && now-bST>=SHOOT_CD) {
      botSTimer=dc.sTimer[0]+Math.random()*(dc.sTimer[1]-dc.sTimer[0]);
      const makeMistake = Math.random() < dc.mistakeRate;
      if (Math.random()>dc.bounceChance) {
        const lf=dc.predict;
        const tx=player.x+player.vx*lf, ty=player.y+player.vy*lf;
        // Mistakes add a big random offset to aim
        const mistakeJitter = makeMistake ? (Math.random()-0.5)*1.2 : 0;
        const a=Math.atan2(ty-bot.y, tx-bot.x)+(Math.random()-.5)*dc.jitter+mistakeJitter;
        fireShot(bot, Math.cos(a), Math.sin(a), 'bot');
      } else {
        const pad=PADS[Math.floor(Math.random()*4)];
        const mistakeJitter = makeMistake ? (Math.random()-0.5)*1.0 : 0;
        const a=Math.atan2(pad.y-bot.y, pad.x-bot.x)+(Math.random()-.5)*dc.jitter*1.5+mistakeJitter;
        fireShot(bot, Math.cos(a), Math.sin(a), 'bot');
      }
    }

    // Bot parry
    botConsiderParry(now);
  }

  // Parry bullet deflection
  checkParryBullets(now);

  // Bullets
  for (const b of bullets) {
    b.trail.push({ x:b.x, y:b.y });
    if (b.trail.length>12) b.trail.shift();
    if (now-b.born>7000) { b.dead=true; continue; }

    const nx=b.x+b.vx, ny=b.y+b.vy;

    if (bulletHitsWall(nx, ny)) {
      spawnHitParticles(b.x, b.y, b.vx, b.vy, b.owner);
      b.dead=true; continue;
    }

    b.x=nx; b.y=ny;

    if (outOfBounds(b.x, b.y)) {
      const ex=clamp(b.x,AR.x,AR.x+AR.w), ey=clamp(b.y,AR.y,AR.y+AR.h);
      spawnHitParticles(ex, ey, b.vx, b.vy, b.owner);
      b.dead=true; continue;
    }

    // Pad bounce
    for (const p of PADS) {
      const dx=b.x-p.x, dy=b.y-p.y, dist=Math.hypot(dx,dy);
      if (dist<PAD_R&&dist>0) {
        const nx2=dx/dist, ny2=dy/dist, dot=b.vx*nx2+b.vy*ny2;
        if (dot<0) {
          b.vx-=2*dot*nx2; b.vy-=2*dot*ny2;
          b.x=p.x+nx2*(PAD_R+1); b.y=p.y+ny2*(PAD_R+1);
        }
      }
    }

    if (b.owner==='bot'&&player.alive&&Math.hypot(b.x-player.x,b.y-player.y)<PR+BR) {
      spawnHitParticles(b.x,b.y,b.vx,b.vy,b.owner);
      player.alive=false; b.dead=true; setTimeout(()=>endRound('bot'),500);
    }
    if (b.owner==='player'&&bot.alive&&Math.hypot(b.x-bot.x,b.y-bot.y)<PR+BR) {
      spawnHitParticles(b.x,b.y,b.vx,b.vy,b.owner);
      bot.alive=false; b.dead=true; setTimeout(()=>endRound('player'),500);
    }
  }
  bullets=bullets.filter(b=>!b.dead);

  if (player.alive&&bot.alive&&player.ammo<=0&&bot.ammo<=0&&bullets.length===0) endRound('draw');

  // Particles
  for (const p of particles) {
    p.life-=p.decay;
    if (p.type==='spark') { p.x+=p.vx; p.y+=p.vy; p.vx*=0.88; p.vy*=0.88; }
    if (p.type==='ring')  { p.r=p.maxR*(1-p.life); }
  }
  particles=particles.filter(p=>p.life>0);

  // Cooldown bars
  document.getElementById('cdf').style.width=Math.min((now-pST)/SHOOT_CD,1)*100+'%';
  document.getElementById('pst').textContent=(now-pST>=SHOOT_CD)?'READY':'RELOAD';
  document.getElementById('bst').textContent=(now-bST>=SHOOT_CD)?'READY':'RELOAD';
  updateParryHUD(now);
}

/* ══════════════════════════════════════════════
   DRAW
══════════════════════════════════════════════ */
function draw(ts) {
  ctx.fillStyle='#06101a'; ctx.fillRect(0,0,CW,CH);

  // Grid
  ctx.strokeStyle='#0c1e2e'; ctx.lineWidth=0.5;
  for (let x=AR.x;x<=AR.x+AR.w;x+=36) { ctx.beginPath(); ctx.moveTo(x,AR.y); ctx.lineTo(x,AR.y+AR.h); ctx.stroke(); }
  for (let y=AR.y;y<=AR.y+AR.h;y+=36) { ctx.beginPath(); ctx.moveTo(AR.x,y); ctx.lineTo(AR.x+AR.w,y); ctx.stroke(); }

  // Arena border
  ctx.strokeStyle='#1a3a5c'; ctx.lineWidth=0.8;
  ctx.setLineDash([4,4]); ctx.strokeRect(AR.x,AR.y,AR.w,AR.h); ctx.setLineDash([]);

  // Pads
  for (const p of PADS) {
    ctx.beginPath(); ctx.arc(p.x,p.y,PAD_R,0,Math.PI*2);
    ctx.fillStyle='rgba(0,100,180,0.15)'; ctx.fill();
    ctx.strokeStyle='#1a6a9a'; ctx.lineWidth=1.5; ctx.stroke();
    const pulse=0.55+0.45*Math.sin(ts*0.0026);
    ctx.beginPath(); ctx.arc(p.x,p.y,PAD_R*0.5*pulse,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,160,220,${0.45*pulse})`; ctx.lineWidth=1; ctx.stroke();
    const s=9; ctx.strokeStyle='rgba(0,160,220,0.45)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(p.x-s,p.y-s); ctx.lineTo(p.x+s,p.y+s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+s,p.y-s); ctx.lineTo(p.x-s,p.y+s); ctx.stroke();
    ctx.fillStyle='rgba(0,160,220,0.38)'; ctx.font='8px monospace';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('BOUNCE', p.x, p.y+PAD_R*0.58);
  }

  // Walls
  for (const w of walls) {
    const col = w.owner==='player'?'#1d9e75': w.owner==='bot'?'#d85a30':'#4a7898';
    ctx.fillStyle = w.owner==='player'?'rgba(29,158,117,0.45)': w.owner==='bot'?'rgba(216,90,48,0.45)':'rgba(74,120,152,0.45)';
    ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.strokeRect(w.x,w.y,w.w,w.h);
  }

  // Particles
  for (const p of particles) {
    const a=Math.max(p.life,0);
    ctx.globalAlpha=a;
    if (p.type==='spark') {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
      ctx.fillStyle=p.col; ctx.fill();
    } else if (p.type==='ring') {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.globalAlpha=a*0.8; ctx.strokeStyle=p.col; ctx.lineWidth=2; ctx.stroke();
    } else if (p.type==='flash') {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
      ctx.globalAlpha=a*0.9; ctx.fillStyle='#ffffff'; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a*1.6,0,Math.PI*2);
      ctx.globalAlpha=a*0.35; ctx.fillStyle=p.col; ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Trails
  for (const b of bullets) {
    if (b.trail.length<2) continue;
    ctx.beginPath(); ctx.moveTo(b.trail[0].x,b.trail[0].y);
    for (let i=1;i<b.trail.length;i++) ctx.lineTo(b.trail[i].x,b.trail[i].y);
    ctx.strokeStyle=b.owner==='player'?'rgba(29,158,117,0.30)':'rgba(216,90,48,0.30)';
    ctx.lineWidth=1.5; ctx.stroke();
  }

  // Bullets
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x,b.y,BR,0,Math.PI*2);
    ctx.fillStyle=b.owner==='player'?'#2dcf99':'#e06832'; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x,b.y,BR+2,0,Math.PI*2);
    ctx.strokeStyle=b.owner==='player'?'rgba(45,207,153,0.28)':'rgba(224,104,50,0.28)';
    ctx.lineWidth=1.5; ctx.stroke();
  }

  // Characters
  if (bot.alive)    drawChar(bot,    '#d85a30','BOT');
  if (player.alive) drawChar(player, '#1d9e75','YOU');

  // Aim line
  if (player?.alive&&gstate==='playing') {
    const dx=mouse.x-player.x, dy=mouse.y-player.y, len=Math.hypot(dx,dy)||1;
    const ex=player.x+dx/len*56, ey=player.y+dy/len*56;
    ctx.setLineDash([3,5]); ctx.strokeStyle='rgba(29,158,117,0.38)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(ex,ey,2.5,0,Math.PI*2); ctx.fillStyle='rgba(29,158,117,0.65)'; ctx.fill();
  }

  // Difficulty badge
  if (gstate==='playing') {
    const cols={easy:'#1d9e75',medium:'#c8a030',hard:'#d85a30'};
    ctx.fillStyle=cols[difficulty]; ctx.font='bold 9px monospace';
    ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText(difficulty.toUpperCase(), AR.x+AR.w-4, AR.y+4);
  }
}

function drawChar(p, col, name) {
  const now=performance.now();
  const ps=name==='YOU'?pParry:bParry;
  if (ps.state==='active') {
    const t=(now-ps.since)/PARRY_WIN;
    const pulse=0.4+0.6*Math.sin(t*Math.PI*6);
    ctx.beginPath(); ctx.arc(p.x,p.y,PR+8,0,Math.PI*2);
    ctx.strokeStyle=name==='YOU'?`rgba(240,208,96,${0.7*pulse})`:`rgba(240,144,48,${0.7*pulse})`;
    ctx.lineWidth=3; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(p.x,p.y,PR-3,0,Math.PI*2);
  ctx.fillStyle=col==='#1d9e75'?'rgba(29,158,117,0.15)':'rgba(216,90,48,0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
  ctx.fillStyle=col; ctx.font='bold 9px monospace';
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText(name, p.x, p.y-PR-3);
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
renderHotkeys();
buildRoundPips();
player={ammo:MAXAMMO}; bot={ammo:MAXAMMO}; updateHUD(); player=null; bot=null;
ctx.fillStyle='#06101a'; ctx.fillRect(0,0,CW,CH);
</script>
